```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IT BAY Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:'Inter',sans-serif;
    overflow:hidden;
}

/* BACKGROUND */

body::before{
    content:'';
    position:fixed;
    width:200%;
    height:200%;
    background:
        radial-gradient(circle,#00f5d4 1px,transparent 1px);
    background-size:40px 40px;
    opacity:0.05;
    animation:moveGrid 25s linear infinite;
    z-index:-1;
}

@keyframes moveGrid{
    from{
        transform:translate(0,0);
    }
    to{
        transform:translate(-200px,-200px);
    }
}

/* IT BAY */

.it-bay-header{
    width:100%;
    text-align:center;
    font-size:115px;
    font-weight:800;
    color:#fff;
    letter-spacing:12px;
    padding-top:18px;
    line-height:1;
    text-shadow:0 0 25px rgba(255,255,255,0.15);
}

/* GREETING */

.top-banner{
    width:100%;
    background:#00f5d4;
    color:#000;
    text-align:center;
    padding:18px 30px;
    font-size:30px;
    font-weight:800;
    letter-spacing:1px;
    margin-top:18px;
}

/* CONTAINER */

.container{
    padding:25px;
}

/* DATE + ANNOUNCEMENT */

.date-section{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:5px;
    gap:20px;
}

/* DATE */

.date{
    font-size:34px;
    font-weight:700;
    color:#ffffff;
    letter-spacing:2px;
}

/* ANNOUNCEMENT */

.announcement{
    font-size:28px;
    font-weight:800;
    color:#00f5d4;
    letter-spacing:1px;
    padding:12px 24px;
    border-radius:18px;
    background:rgba(0,245,212,0.08);
    border:1px solid rgba(0,245,212,0.25);

    box-shadow:
    0 0 20px rgba(0,245,212,0.08);
}

/* USER SATISFACTION */

.satisfaction-card{
    margin-top:25px;
    background:#1a1a1a;
    border-radius:26px;
    padding:28px 32px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 0 25px rgba(255,255,255,0.03);
}

/* LEFT TEXT */

.satisfaction-text{
    display:flex;
    flex-direction:column;
}

.satisfaction-title{
    font-size:30px;
    font-weight:800;
    color:#00f5d4;
    letter-spacing:2px;
}

.satisfaction-sub{
    margin-top:8px;
    font-size:20px;
    color:#d0d0d0;
    letter-spacing:1px;
}

/* SCORE */

.rating{
    text-align:right;
}

.score{
    font-size:78px;
    font-weight:800;
    color:#ffffff;
    line-height:1;
}

.out-of{
    font-size:22px;
    color:#d0d0d0;
    margin-top:2px;
}

/* GOLDEN WAVE STARS */

.stars{
    margin-top:12px;
    display:flex;
    gap:10px;
    justify-content:flex-end;
}

.star{
    font-size:44px;
    color:#FFD700;

    animation:waveRoll 1.4s infinite ease-in-out;

    filter:
    drop-shadow(0 0 12px rgba(255,215,0,0.9))
    drop-shadow(0 0 24px rgba(255,215,0,0.7));
}

/* STAR DELAYS */

.star:nth-child(1){
    animation-delay:0s;
}

.star:nth-child(2){
    animation-delay:0.12s;
}

.star:nth-child(3){
    animation-delay:0.24s;
}

.star:nth-child(4){
    animation-delay:0.36s;
}

.star:nth-child(5){
    animation-delay:0.48s;
}

/* ROLLING WAVE */

@keyframes waveRoll{

    0%,100%{
        transform:
        translateY(0px)
        rotate(0deg)
        scale(1);

        opacity:0.8;
    }

    50%{
        transform:
        translateY(-16px)
        rotate(18deg)
        scale(1.25);

        opacity:1;

        filter:
        drop-shadow(0 0 20px rgba(255,215,0,1))
        drop-shadow(0 0 40px rgba(255,215,0,0.9));
    }
}

/* TECH SECTION */

.animation-section{
    margin-top:28px;
    height:50vh;
    border-radius:30px;
    background:#101010;
    position:relative;
    overflow:hidden;
    box-shadow:0 0 30px rgba(255,255,255,0.03);

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* GLOW */

.glow{
    position:absolute;
    width:520px;
    height:520px;
    background:#00f5d4;
    filter:blur(180px);
    opacity:0.08;
    animation:pulseGlow 5s infinite;
}

/* COMPUTER DOCTOR */

.doctor{
    position:relative;
    animation:float 4s ease-in-out infinite;
    z-index:2;
    transform:scale(1.45);
}

/* MONITOR */

.monitor{
    width:240px;
    height:160px;
    background:#00f5d4;
    border-radius:18px;
    position:relative;
    box-shadow:
    0 0 35px rgba(0,245,212,0.35),
    0 0 80px rgba(0,245,212,0.25);
}

/* FACE */

.face{
    position:absolute;
    width:100%;
    height:100%;
}

/* EYES */

.eye{
    width:20px;
    height:20px;
    background:#000;
    border-radius:50%;
    position:absolute;
    top:55px;
    animation:blink 5s infinite;
}

.eye.left{
    left:68px;
}

.eye.right{
    right:68px;
}

/* SMILE */

.monitor-smile{
    width:75px;
    height:38px;
    border-bottom:8px solid #000;
    border-radius:0 0 90px 90px;
    position:absolute;
    left:82px;
    top:88px;
}

/* STAND */

.stand{
    width:60px;
    height:25px;
    background:#00f5d4;
    margin:auto;
}

.base{
    width:140px;
    height:16px;
    background:#00f5d4;
    border-radius:12px;
    margin:auto;
}

/* PLUS */

.plus{
    position:absolute;
    top:-18px;
    right:-15px;
    color:#00fff2;
    font-size:46px;
    font-weight:800;
    animation:pulse 2s infinite;
    text-shadow:
    0 0 12px rgba(0,255,242,0.9),
    0 0 30px rgba(0,255,242,0.8);
}

/* TEXT */

.tech-text{
    margin-top:40px;
    font-size:54px;
    font-weight:800;
    letter-spacing:8px;
    text-align:center;
    color:white;
    text-shadow:
    0 0 20px rgba(255,255,255,0.12),
    0 0 35px rgba(0,245,212,0.15);
}

.sub-text{
    margin-top:14px;
    font-size:24px;
    color:#00f5d4;
    letter-spacing:3px;
    font-weight:700;
    animation:flicker 3s infinite;
    text-align:center;
}

/* FLOAT */

@keyframes float{

    0%{
        transform:translateY(0px) scale(1.45);
    }

    50%{
        transform:translateY(-14px) scale(1.45);
    }

    100%{
        transform:translateY(0px) scale(1.45);
    }
}

/* PULSE */

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.2);
    }

    100%{
        transform:scale(1);
    }
}

/* BLINK */

@keyframes blink{

    0%,45%,50%,100%{
        height:20px;
    }

    48%{
        height:4px;
    }
}

/* GLOW */

@keyframes pulseGlow{

    0%{
        transform:scale(1);
        opacity:0.06;
    }

    50%{
        transform:scale(1.1);
        opacity:0.12;
    }

    100%{
        transform:scale(1);
        opacity:0.06;
    }
}

/* FLICKER */

@keyframes flicker{

    0%,100%{
        opacity:1;
    }

    50%{
        opacity:0.7;
    }
}

</style>

</head>

<body>

<!-- IT BAY -->

<div class="it-bay-header">
    IT BAY
</div>

<!-- GREETING -->

<div class="top-banner" id="greetingBanner">
    Good Morning • Please Raise IT Tickets via Jira
</div>

<div class="container">

    <!-- DATE + ANNOUNCEMENT -->

    <div class="date-section">

        <div class="date" id="date">
            Monday, June 12
        </div>

        <div class="announcement" id="announcement">
            📢 Team Huddle at 12:30 PM
        </div>

    </div>

    <!-- USER SATISFACTION -->

    <div class="satisfaction-card">

        <div class="satisfaction-text">

            <div class="satisfaction-title">
                USER SATISFACTION SCORE
            </div>

            <div class="satisfaction-sub">
                Delivering Exceptional IT Support Experiences
            </div>

        </div>

        <div class="rating">

            <div class="score">
                4.90
            </div>

            <div class="out-of">
                out of 5
            </div>

            <div class="stars">

                <span class="star">★</span>
                <span class="star">★</span>
                <span class="star">★</span>
                <span class="star">★</span>
                <span class="star">★</span>

            </div>

        </div>

    </div>

    <!-- TECH DOCTOR -->

    <div class="animation-section">

        <div class="glow"></div>

        <div class="doctor">

            <div class="monitor">

                <div class="face">

                    <div class="eye left"></div>
                    <div class="eye right"></div>

                    <div class="monitor-smile"></div>

                </div>

            </div>

            <div class="stand"></div>
            <div class="base"></div>

            <div class="plus">+</div>

        </div>

        <div class="tech-text">
            TECH DOCTORS AT WORK
        </div>

        <div class="sub-text">
            Keeping Systems Healthy • Secure • Online
        </div>

    </div>

</div>

<script>

/* DATE + ANNOUNCEMENT */

function updateDate(){

    const now = new Date();

    const options = {
        weekday:'long',
        month:'long',
        day:'numeric'
    };

    document.getElementById("date").innerText =
        now.toLocaleDateString('en-US',options);

    // Friday = Team Meeting

    const isFriday = now.getDay() === 5;

    document.getElementById("announcement").innerText =
        isFriday
        ? "📢 Team Meeting at 3:30 PM"
        : "📢 Team Huddle at 12:30 PM";
}

/* GREETING */

function updateGreeting(){

    const hour = new Date().getHours();

    let greeting = "";

    if(hour >= 5 && hour < 12){
        greeting = "Good Morning";
    }

    else if(hour >= 12 && hour < 17){
        greeting = "Good Afternoon";
    }

    else{
        greeting = "Good Evening";
    }

    document.getElementById("greetingBanner").innerText =
        greeting + " • Please Raise IT Tickets via Jira";
}

/* INITIAL LOAD */

updateDate();
updateGreeting();

</script>

</body>

</html>
